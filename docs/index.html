<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EmployeeFormExample Documentation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5c6578;
      --border: #d7ddea;
      --accent: #1e5eff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, #dfe9ff 0%, transparent 35%),
        linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      width: min(720px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 24px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(23, 32, 51, 0.10);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    select {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      font-weight: 600;
    }
    .link-list {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: grid;
      gap: 10px;
    }
    .link-list a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>EmployeeFormExample Documentation</h1>
    <p>Select the documentation stream you want to browse. Each channel is published independently so integration, staging, and release docs can stay live at the same time.</p>
    <label for="channel-select">Release channel</label>
    <select id="channel-select"></select>
    <div class="actions">
      <a class="button" id="open-docs" href="./documentation/integration/employeeformexample/">Open documentation</a>
    </div>
    <div class="link-list" id="direct-links"></div>
  </main>
  <script>
    const channels = [
      { name: "integration", title: "Integration", href: "./documentation/integration/employeeformexample/" },
    ];

    const select = document.getElementById("channel-select");
    const openLink = document.getElementById("open-docs");
    const directLinks = document.getElementById("direct-links");

    channels.forEach((channel) => {
      const option = document.createElement("option");
      option.value = channel.href;
      option.textContent = channel.title;
      select.appendChild(option);

      const link = document.createElement("a");
      link.href = channel.href;
      link.textContent = channel.title + " documentation";
      directLinks.appendChild(link);
    });

    select.value = "./documentation/integration/employeeformexample/";
    select.addEventListener("change", () => {
      openLink.href = select.value;
    });
  </script>
</body>
</html>
