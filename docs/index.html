<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImageDataPicker Documentation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eff3fb;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #172033;
      --muted: #5f6b82;
      --border: #d6deef;
      --accent: #0b5cff;
      --accent-soft: #eaf1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #dce7ff 0%, transparent 30%),
        radial-gradient(circle at bottom right, #e9f3ff 0%, transparent 30%),
        linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
    }
    main {
      width: min(760px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 24px 64px rgba(23, 32, 51, 0.10);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }
    .controls {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 1rem;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      padding: 12px 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .channel-links {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .channel-links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>ImageDataPicker Documentation</h1>
    <p>Browse the framework and sample app documentation across the integration, staging, and release channels from one GitHub Pages site.</p>
    <div class="controls">
      <div>
        <label for="channel-select">Release channel</label>
        <select id="channel-select"></select>
      </div>
      <div>
        <label for="project-select">Project</label>
        <select id="project-select"></select>
      </div>
    </div>
    <div class="actions">
      <a class="button" id="open-docs" href="./release/imagedatapicker/documentation/imagedatapicker/">Open documentation</a>
    </div>
    <div class="channel-links" id="channel-links"></div>
  </main>
  <script>
    const docs = {
      "release": {
        "imagedatapicker": {
          title: "imagedatapicker",
          label: "ImageDataPicker",
          href: "./release/imagedatapicker/documentation/imagedatapicker/"
        },
        "employeeformexample": {
          title: "employeeformexample",
          label: "EmployeeFormExample",
          href: "./release/employeeformexample/documentation/employeeformexample/"
        },
      },
      "staging": {
        "imagedatapicker": {
          title: "imagedatapicker",
          label: "ImageDataPicker",
          href: "./staging/imagedatapicker/documentation/imagedatapicker/"
        },
        "employeeformexample": {
          title: "employeeformexample",
          label: "EmployeeFormExample",
          href: "./staging/employeeformexample/documentation/employeeformexample/"
        },
      },
      "integration": {
        "imagedatapicker": {
          title: "imagedatapicker",
          label: "ImageDataPicker",
          href: "./integration/imagedatapicker/documentation/imagedatapicker/"
        },
        "employeeformexample": {
          title: "employeeformexample",
          label: "EmployeeFormExample",
          href: "./integration/employeeformexample/documentation/employeeformexample/"
        },
      },
    };

    const channelLabels = {
      release: "Release",
      staging: "Staging",
      integration: "Integration",
    };

    const channelSelect = document.getElementById("channel-select");
    const projectSelect = document.getElementById("project-select");
    const openLink = document.getElementById("open-docs");
    const channelLinks = document.getElementById("channel-links");

    function renderChannelOptions() {
      Object.keys(docs).forEach((channel) => {
        const option = document.createElement("option");
        option.value = channel;
        option.textContent = channelLabels[channel] || channel;
        channelSelect.appendChild(option);

        const link = document.createElement("a");
        link.href = "./" + channel + "/";
        link.textContent = (channelLabels[channel] || channel) + " overview";
        channelLinks.appendChild(link);
      });
    }

    function renderProjectOptions(channel) {
      projectSelect.innerHTML = "";
      const projects = docs[channel] || {};

      Object.keys(projects).forEach((project) => {
        if (project === "__empty__") return;
        const option = document.createElement("option");
        option.value = project;
        option.textContent = projects[project].label;
        projectSelect.appendChild(option);
      });
    }

function syncOpenLink() {
  const channel = channelSelect.value;
  const project = projectSelect.value;
  const entry = (docs[channel] || {})[project];
  if (!entry) return;
  openLink.href = entry.href;
}

    renderChannelOptions();
    channelSelect.value = "release";
    renderProjectOptions(channelSelect.value);
    projectSelect.value = "imagedatapicker";
    syncOpenLink();

    channelSelect.addEventListener("change", () => {
      renderProjectOptions(channelSelect.value);
      syncOpenLink();
    });

    projectSelect.addEventListener("change", syncOpenLink);
  </script>
</body>
</html>
