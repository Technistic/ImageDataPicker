name: OSS Build and Test

on:
  pull_request:
  push:
    branches:
      - main
      - 'alpha_v*'
      - 'alpha-v*'
      - 'beta_v*'
      - 'beta-v*'

permissions:
  contents: read

concurrency:
  group: oss-build-and-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release metadata for release branches
        if: ${{ github.event_name == 'push' && (startsWith(github.ref_name, 'alpha_') || startsWith(github.ref_name, 'alpha-') || startsWith(github.ref_name, 'beta_') || startsWith(github.ref_name, 'beta-') || github.ref_name == 'main') }}
        env:
          CI_BRANCH: ${{ github.ref_name }}
        run: bash ci_scripts/get_version_from_git_ref.sh

      - name: Swift package tests
        run: swift test

  xcode-tests:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        scheme:
          - ImageDataPicker
          - EmployeeFormExample
        include:
          - scheme: ImageDataPicker
            project: ImageDataPicker/ImageDataPicker.xcodeproj
          - scheme: EmployeeFormExample
            project: EmployeeFormExample/EmployeeFormExample.xcodeproj
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unsigned macOS tests
        run: |
          xcodebuild test \
            -project "${{ matrix.project }}" \
            -scheme "${{ matrix.scheme }}" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
